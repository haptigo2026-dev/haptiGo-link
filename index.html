<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HaptiGo – Apri percorso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 32px;
      background: #FFC107;
      color: #000;
      font-weight: bold;
      font-size: 18px;
      border-radius: 12px;
      text-decoration: none;
    }
    .info { color: #ccc; margin-top: 12px; }
    .store { margin-top: 24px; font-size: 13px; color: #888; }
    .store a { color: #FFC107; }
  </style>
</head>
<body>
  <h2>🏍️ Percorso HaptiGo</h2>
  <p id="dest" class="info">Caricamento...</p>
  <p id="stops" class="info" style="font-size: 13px;"></p>
  <a id="openBtn" class="btn" href="#">Apri in HaptiGo</a>
  <p class="store">
    Non hai l'app?
    <a href="https://play.google.com/store/apps/details?id=com.example.haptiGo">
      Scaricala dal Play Store
    </a>
  </p>
  <script>
    var params = window.location.search;
    var p = new URLSearchParams(params);

    // Mostra destinazione
    var dest = p.get('dest_name');
    if (dest) {
      document.getElementById('dest').textContent =
        'Destinazione: ' + decodeURIComponent(dest);
    }

    // Mostra tappe se presenti
    var wp = p.get('waypoints');
    if (wp) {
      try {
        var arr = JSON.parse(decodeURIComponent(wp));
        var names = arr.map(function(w) { return w.name; });
        document.getElementById('stops').textContent =
          'Tappe: ' + names.join(' \u2192 ');
      } catch(e) {}
    }

    // Costruisci Intent URI (formato che Chrome su Android riconosce)
    // intent://route?parametri#Intent;scheme=haptiGo;package=com.example.haptiGo;end
    var queryString = params.substring(1); // rimuovi il ? iniziale
    var intentUri = 'intent://route?' + queryString +
      '#Intent;scheme=haptiGo;package=com.example.haptiGo;end';

    document.getElementById('openBtn').href = intentUri;

    // Tenta apertura automatica
    setTimeout(function() { window.location.href = intentUri; }, 500);
  </script>
</body>
</html>
